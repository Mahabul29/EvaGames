<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EvaKnife - EvaGames</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink: #12101c;
            --panel: #1e1a30;
            --paper: #f2e7d5;
            --gold: #d4a24c;
            --gold-soft: #e9c98a;
            --muted: #9a92b8;
            --red: #e6473f;
        }

        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle at 20% 0%, #221c3a 0%, var(--ink) 55%);
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: var(--paper);
            overflow: hidden;
        }
        .game-container {
            position: relative;
            text-align: center;
        }
        .back-btn {
            position: absolute;
            top: -50px;
            left: 0;
            color: var(--muted);
            text-decoration: none;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: color 0.2s;
        }
        .back-btn:hover { color: var(--paper); }
        
        canvas {
            background: var(--panel);
            border: 2px solid rgba(212, 162, 76, 0.2);
            border-radius: 18px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            cursor: pointer;
            display: block;
        }
        .ui-layer {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            pointer-events: none;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .score {
            font-family: 'Baloo 2', sans-serif;
            font-size: 32px;
            font-weight: 700;
            color: var(--gold);
        }
        .stage {
            font-size: 16px;
            font-weight: 600;
            color: var(--gold-soft);
            background: rgba(212, 162, 76, 0.1);
            padding: 4px 12px;
            border-radius: 12px;
        }
        .knife-ammo {
            position: absolute;
            bottom: 30px;
            left: 20px;
            display: flex;
            flex-direction: column-reverse;
            gap: 6px;
            pointer-events: none;
        }
        .knife-icon {
            font-size: 20px;
            opacity: 0.3;
            transition: opacity 0.2s;
        }
        .knife-icon.available {
            opacity: 1;
            color: var(--gold-soft);
        }
        .game-over-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(18, 16, 28, 0.95);
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .game-over-screen.active {
            opacity: 1;
            pointer-events: auto;
        }
        .game-over-screen h2 {
            font-family: 'Baloo 2', sans-serif;
            font-size: 36px;
            margin: 0 0 10px 0;
            color: var(--red);
        }
        .restart-btn {
            background: var(--gold);
            color: var(--ink);
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            font-family: inherit;
            transition: transform 0.1s, background 0.2s;
        }
        .restart-btn:hover { background: var(--gold-soft); transform: scale(1.05); }
    </style>
</head>
<body>

<div class="game-container">
    <a href="/" class="back-btn">← Back to Shelf</a>
    
    <div class="ui-layer">
        <div class="score" id="scoreDisplay">0</div>
        <div class="stage" id="stageDisplay">Stage 1</div>
    </div>

    <div class="knife-ammo" id="ammoContainer"></div>

    <canvas id="gameCanvas" width="400" height="550"></canvas>

    <div class="game-over-screen" id="gameOverScreen">
        <h2 id="gameOverTitle">Game Over</h2>
        <p style="margin: 0 0 20px 0; color: var(--muted);">Final Score: <span id="finalScore" style="color: var(--paper); font-weight: bold;">0</span></p>
        <button class="restart-btn" onclick="resetGame()">Try Again</button>
    </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const scoreDisplay = document.getElementById('scoreDisplay');
const stageDisplay = document.getElementById('stageDisplay');
const ammoContainer = document.getElementById('ammoContainer');
const gameOverScreen = document.getElementById('gameOverScreen');
const gameOverTitle = document.getElementById('gameOverTitle');
const finalScore = document.getElementById('finalScore');

// Board Coordinates
const LOG_X = canvas.width / 2;
const LOG_Y = 160;
const LOG_RADIUS = 70;
const KNIFE_START_Y = canvas.height - 70;

// Game Config Arrays
let currentRotation = 0;
let rotationSpeed = 0.03;
let knivesOnLog = []; // Contains angles of successfully placed knives
let activeKnife = null; // The projectile knife currently scaling up the screen

let score = 0;
let stage = 1;
let ammoCount = 7;
let isGameOver = false;
let logShakeIntensity = 0;

function init() {
    knivesOnLog = [];
    activeKnife = null;
    isGameOver = false;
    logShakeIntensity = 0;
    gameOverScreen.classList.remove('active');
    
    // Auto design variables depending on current progress tier
    ammoCount = 6 + Math.min(stage, 4);
    rotationSpeed = 0.025 + (stage * 0.005);
    if(stage % 2 === 0) rotationSpeed *= -1; // alternate directions

    // Generate random pre-existing hurdle obstacles for higher stages
    if(stage > 1) {
        let presetKnives = Math.min(stage - 1, 3);
        for(let i=0; i < presetKnives; i++) {
            knivesOnLog.push((Math.random() * Math.PI * 2));
        }
    }

    scoreDisplay.innerText = score;
    stageDisplay.innerText = `Stage ${stage}`;
    buildAmmoUI();
    prepareNextKnife();
}

function buildAmmoUI() {
    ammoContainer.innerHTML = '';
    for(let i = 0; i < ammoCount; i++) {
        const icon = document.createElement('span');
        icon.className = 'knife-icon available';
        icon.innerText = '🗡️';
        ammoContainer.appendChild(icon);
    }
}

function prepareNextKnife() {
    if (ammoCount > 0 && !isGameOver) {
        activeKnife = { x: LOG_X, y: KNIFE_START_Y, isFlying: false };
    }
}

function throwKnife() {
    if (!activeKnife || activeKnife.isFlying || isGameOver) return;
    activeKnife.isFlying = true;
    
    // Dim out item indicator row from ammunition visual matrix
    const icons = ammoContainer.querySelectorAll('.knife-icon.available');
    if(icons.length > 0) {
        icons[icons.length - 1].classList.remove('available');
    }
}

function checkCollisions() {
    if (!activeKnife || !activeKnife.isFlying) return;

    // Contact threshold distance wrapper
    const targetEdgeY = LOG_Y + LOG_RADIUS - 10;
    
    if (activeKnife.y <= targetEdgeY) {
        // Translate spatial geometry point into current angular index references
        let impactAngle = Math.PI / 2 - currentRotation;
        
        // Normalize angle parameter ranges safely between 0 to 2PI
        impactAngle = (impactAngle % (Math.PI * 2) + Math.PI * 2) % (Math.PI * 2);

        // Scan existing blade alignments for collision overlaps
        const proximityThreshold = 0.22; // Distance buffer parameters in radians
        for (let i = 0; i < knivesOnLog.length; i++) {
            let diff = Math.abs(impactAngle - knivesOnLog[i]);
            diff = Math.min(diff, Math.PI * 2 - diff); // Circular difference logic
            
            if (diff < proximityThreshold) {
                failGame();
                return;
            }
        }

        // Clean latch execution
        knivesOnLog.push(impactAngle);
        score += 1;
        scoreDisplay.innerText = score;
        ammoCount--;
        logShakeIntensity = 6; // Hit feedback visual kick

        // Global framework personal tracking updates
        if (window.updateArcadeHighScore) {
            window.updateArcadeHighScore('knife', score);
        }

        // Stage pass conditions validation metrics
        if (ammoCount <= 0) {
            stage++;
            setTimeout(init, 400);
        } else {
            prepareNextKnife();
        }
    }
}

function failGame() {
    isGameOver = true;
    activeKnife.isFlying = false;
    // Animate falling failed knife
    let fallY = activeKnife.y;
    let fallX = activeKnife.x;
    
    gameOverTitle.innerText = "Knife Deflected!";
    finalScore.innerText = score;
    gameOverScreen.classList.add('active');
}

function resetGame() {
    stage = 1;
    score = 0;
    init();
}

// Global UI Hook Event inputs
window.addEventListener('keydown', (e) => {
    if (e.code === 'Space') {
        e.preventDefault();
        throwKnife();
    }
});
canvas.addEventListener('click', throwKnife);

// Main Engine Draw Tick Loop
function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Apply soft rhythmic rotation pacing variations dynamically 
    if(!isGameOver) {
        currentRotation += rotationSpeed;
        // Periodic speed shift variables on harder levels
        if(stage > 2) {
            currentRotation += Math.sin(Date.now() * 0.002) * 0.01;
        }
    }

    // Handle screen shake logic offsets
    ctx.save();
    if(logShakeIntensity > 0) {
        let dx = (Math.random() - 0.5) * logShakeIntensity;
        let dy = (Math.random() - 0.5) * logShakeIntensity;
        ctx.translate(dx, dy);
        logShakeIntensity *= 0.8;
        if(logShakeIntensity < 0.2) logShakeIntensity = 0;
    }

    // 1. Draw Target Wheel log hub element
    ctx.beginPath();
    ctx.arc(LOG_X, LOG_Y, LOG_RADIUS, 0, Math.PI * 2);
    ctx.fillStyle = 'var(--gold)';
    ctx.strokeStyle = 'var(--ink)';
    ctx.lineWidth = 6;
    ctx.fill();
    ctx.stroke();

    // Inside concentric core details lines
    ctx.beginPath();
    ctx.arc(LOG_X, LOG_Y, LOG_RADIUS - 20, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(18, 16, 28, 0.2)';
    ctx.lineWidth = 4;
    ctx.stroke();

    // 2. Draw Locked Knives on Log
    knivesOnLog.forEach(angle => {
        ctx.save();
        ctx.translate(LOG_X, LOG_Y);
        ctx.rotate(angle + currentRotation);
        
        // Blade geometry pointing inwards
        ctx.fillStyle = 'var(--paper)';
        ctx.strokeStyle = 'var(--ink)';
        ctx.lineWidth = 2;
        ctx.fillRect(-4, LOG_RADIUS, 8, 40);
        ctx.strokeRect(-4, LOG_RADIUS, 8, 40);

        // Hilt handle highlights
        ctx.fillStyle = 'var(--panel-2)';
        ctx.fillRect(-6, LOG_RADIUS + 40, 12, 15);
        
        ctx.restore();
    });
    ctx.restore(); // Undo potential screen shake matrix offset

    // 3. Handle projectile physics calculations pipelines
    if (activeKnife) {
        if (activeKnife.isFlying) {
            activeKnife.y -= 22; // Travel speed vectors
            checkCollisions();
        }

        if(!isGameOver || activeKnife.isFlying) {
            // Draw Idle waiting launcher blade
            ctx.fillStyle = 'var(--paper)';
            ctx.strokeStyle = 'var(--ink)';
            ctx.lineWidth = 2;
            ctx.fillRect(activeKnife.x - 4, activeKnife.y, 8, 40);
            ctx.strokeRect(activeKnife.x - 4, activeKnife.y, 8, 40);

            ctx.fillStyle = 'var(--gold-soft)';
            ctx.fillRect(activeKnife.x - 6, activeKnife.y + 40, 12, 15);
        }
    }

    requestAnimationFrame(animate);
}

init();
animate();
</script>
</body>
  </html>
