<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EvaLudo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='css/ludo.css') }}">
</head>
<body class="ludo-body">

<a class="back-link" href="/">← EvaGames</a>

<!-- ============ SETUP ============ -->
<section id="setup-view" class="setup-view">

  <h1 class="game-title">🎲 EvaLudo</h1>

  <div class="setup-card">
    <p class="setup-step-label">Step 1 — Connection</p>
    <div class="choice-row" id="mode-choice">
      <button class="choice-btn active" data-mode="offline">
        <strong>Offline</strong>
        <span>Play on this device</span>
      </button>
      <button class="choice-btn" data-mode="online" disabled>
        <strong>Online</strong>
        <span>Coming soon</span>
      </button>
    </div>
  </div>

  <div class="setup-card">
    <p class="setup-step-label">Step 2 — Who's playing</p>
    <div class="choice-row" id="players-choice">
      <button class="choice-btn active" data-players="single">
        <strong>Single player</strong>
        <span>You vs. computer</span>
      </button>
      <button class="choice-btn" data-players="local">
        <strong>Pass &amp; play</strong>
        <span>Take turns on this device</span>
      </button>
    </div>
  </div>

  <div class="setup-card">
    <p class="setup-step-label">Step 3 — How many tokens on the board</p>
    <div class="choice-row four" id="count-choice">
      <button class="choice-btn" data-count="2">2</button>
      <button class="choice-btn active" data-count="4">4</button>
    </div>
  </div>

  <div class="setup-card" id="color-card">
    <p class="setup-step-label">Step 4 — Assign colors</p>
    <div class="seat-list" id="seat-list"></div>
  </div>

  <button class="start-btn" id="start-btn">Start game</button>
</section>

<!-- ============ GAME ============ -->
<section id="game-view" class="game-view hidden">

  <div class="hud-top">
    <button class="hud-quit" id="quit-btn" title="Back to setup">⟲</button>
  </div>

  <div class="board-wrap">
    <div id="board" class="board"></div>
  </div>

  <div class="player-dice-list" id="player-dice-list"></div>

</section>

<!-- ============ WIN OVERLAY ============ -->
<div id="win-overlay" class="win-overlay hidden">
  <div class="win-card">
    <p class="win-emoji">🏆</p>
    <h2 id="win-text">Winner!</h2>
    <button id="win-restart" class="start-btn">Play again</button>
  </div>
</div>

<script src="{{ url_for('static', filename='js/ludo.js') }}"></script>
</body>
        </html>
